<!DOCTYPE html>
<html>

<head>

    <title>Cloud Institution Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="login-container">

        <h2>Cloud Institution Login</h2>

        <form id="loginForm">

            <label>Username</label>

            <input
                type="text"
                id="username"
                placeholder="Enter username"
                required
            >

            <label>Password</label>

            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
